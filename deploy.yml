name: Deploy Climate CRM to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No npm, no node, no build step.
      # The app uses React + Babel from CDN — just upload the two files.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # upload entire repo root (contains index.html + App.jsx)

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
