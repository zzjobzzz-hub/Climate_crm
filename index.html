<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Climate CRM — Wave Exponential BCG" />
  <title>Climate CRM | Wave BCG</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230c1a2e'/><text x='4' y='24' font-size='20' font-weight='900' fill='%2300b3a4'>W</text></svg>" />

  <!-- React 18 UMD globals: window.React, window.ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone — transforms JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- Expose React hooks as globals so App.jsx can use them without imports -->
  <script>
    const { useState, useMemo, useRef, useEffect, useCallback,
            useReducer, useContext, createContext, memo, Fragment } = React;
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; background: #f8fafc; }
    #root { min-height: 100vh; }
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #0c1a2e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo { font-size: 38px; font-weight: 900; color: #00b3a4;
      letter-spacing: -0.04em; font-family: system-ui, sans-serif; }
    .splash-sub  { font-size: 13px; color: #64748b; margin-top: 6px;
      font-family: system-ui, sans-serif; }
    .splash-spin { width: 34px; height: 34px; margin-top: 28px;
      border: 3px solid rgba(0,179,164,0.15);
      border-top-color: #00b3a4; border-radius: 50%;
      animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="splash">
    <div class="splash-logo">Climate CRM</div>
    <div class="splash-sub">Wave Exponential Public Company Limited</div>
    <div class="splash-spin"></div>
  </div>

  <div id="root"></div>

  <!--
    App.jsx has no import/export — React hooks are globals (set above).
    Babel transforms JSX only. After transform, App() is a plain global function.
  -->
<script type="text/babel" data-presets="react" src="./src/App.jsx"></script>

  <script>
    function tryMount() {
      if (typeof App !== "undefined") {
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(App));
        const s = document.getElementById("splash");
        if (s) { s.classList.add("hide"); setTimeout(() => s.remove(), 500); }
      } else {
        setTimeout(tryMount, 100);
      }
    }
    setTimeout(tryMount, 500);
  </script>

</body>
</html>
