<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Climate CRM — Wave Exponential BCG" />
    <title>Climate CRM | Wave BCG</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230c1a2e'/><text x='4' y='24' font-size='20' font-weight='900' fill='%2300b3a4'>W</text></svg>"
    />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; background: #f8fafc; }
      #root { min-height: 100vh; }
      /* Splash screen — removed by React once mounted */
      #splash {
        position: fixed; inset: 0;
        background: #0c1a2e;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.3s;
      }
      #splash-logo {
        font-size: 36px; font-weight: 900;
        color: #00b3a4; letter-spacing: -0.04em;
        font-family: system-ui, sans-serif;
      }
      #splash-sub {
        font-size: 12px; color: #64748b;
        margin-top: 6px; font-family: system-ui, sans-serif;
      }
      #splash-spin {
        width: 32px; height: 32px; margin-top: 28px;
        border: 3px solid rgba(0,179,164,0.2);
        border-top-color: #00b3a4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">Climate CRM</div>
      <div id="splash-sub">Wave Exponential Public Company Limited</div>
      <div id="splash-spin"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React mounts
      window.__hideSplash = () => {
        const s = document.getElementById("splash");
        if (s) { s.style.opacity = "0"; setTimeout(() => s.remove(), 300); }
      };
    </script>
  </body>
</html>
